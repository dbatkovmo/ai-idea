services:
  web:
    build:
      context: ./apps/web
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-football_value}
      POSTGRES_USER: ${POSTGRES_USER:-football}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-football}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
